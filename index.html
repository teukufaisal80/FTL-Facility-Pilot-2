  function parseDate(s){if(!s)return null;const gviz=s.match(/Date\((\d{4}),(\d+),(\d+)\)/);if(gviz)return new Date(+gviz[1],+gviz[2],+gviz[3]);const mn={jan:0,feb:1,mar:2,apr:3,may:4,mei:4,jun:5,jul:6,aug:7,agu:7,sep:8,oct:9,okt:9,nov:10,dec:11,des:11};const mStr=s.match(/(\d{1,2})\s+([a-z]{3,})\s+(\d{4})/i)||s.match(/([a-z]{3,})\s+(\d{1,2}),?\s+(\d{4})/i);if(mStr){const isNF=/^\d/.test(mStr[0]);const day=isNF?+mStr[1]:+mStr[2];const monStr=(isNF?mStr[2]:mStr[1]).toLowerCase().slice(0,3);const mon=mn[monStr];const year=+mStr[3];if(mon!==undefined)return new Date(year,mon,day);}let d=new Date(s);if(!isNaN(d)&&d.getFullYear()>2000)return d;const p=s.split(/[\/\-\.]/);if(p.length===3){if(p[2].length===4){d=new Date(`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`);if(!isNaN(d)&&d.getFullYear()>2000)return d;}if(p[0].length===4){d=new Date(`${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`);if(!isNaN(d)&&d.getFullYear()>2000)return d;}}return null;}

  function parseSheetResp(resp,gidStr){
    if(!resp?.table)return[];
    let headers=resp.table.cols.map(c=>(c.label||"").trim());
    let cells=resp.table.rows.map(r=>r.c.map(cell=>({f:(!cell||cell.v==null?"":String(cell.f||cell.v)),v:(!cell||cell.v==null?"":String(cell.v))})));
    let rows=cells.map(r=>r.map(cell=>cell.f));let hoff=1;
    if(!headers.some(h=>/tanggal|cabang|issue|sumber/i.test(h))&&rows.length){if(rows[0].some(v=>/tanggal|cabang|issue|sumber/i.test(v))){headers=rows[0];rows=rows.slice(1);cells=cells.slice(1);hoff=2;}}
    const h=headers.map(x=>x.toLowerCase().trim()),ci={};
    h.forEach((v,i)=>{
      if(v.includes("tanggal")||v.includes("date"))ci.date=i;
      if((v.includes("cabang")||v.includes("branch"))&&!v.includes("nama"))ci.branch=i;
      if(v.includes("rating")||v.includes("google rating"))ci.rating=i;
      if(v.includes("sumber")||v.includes("source"))ci.source=i;
      if(v.includes("komentar")||v.includes("comment"))ci.comment=i;
      if(v==="issue"||v.startsWith("issue")||v.includes("kategori")||v.includes("category")||v.includes("issue"))ci.issue=i;
      if(v.includes("inti permasalahan")||v.includes("summary")||v.includes("inti"))ci.summary=i;
      if(v==="status"||v.includes("status pelacakan"))ci.status=i;
      if(v.includes("feedback")&&!v.includes("inti"))ci.feedback=i;
      if((v.includes("nama customer")||v.includes("nama member")||v.includes("customer"))&&!v.includes("cabang"))ci.customer=i;
    });
    if(ci.date==null){const ncols=cells[0]?.length||0;for(let col=0;col<ncols;col++){if(cells.some(r=>r[col]?.v&&/^Date\(\d+,\d+,\d+\)$/.test(r[col].v))){ci.date=col;break;}}}
    if(ci.source==null){const srcKw=/^(google review|whatsapp|instagram|quick response|in-apps|panggilan)$/i;const ncols=cells[0]?.length||0;for(let col=0;col<ncols;col++){const vals=cells.map(r=>r[col]?.f||r[col]?.v||"").filter(Boolean);if(vals.filter(v=>srcKw.test(v.trim())).length>vals.length*0.5){ci.source=col;break;}}}
    if(ci.issue==null){const catKw=/^(komplain fasilitas|komplain alat|komplain kebersihan|komplain staff|request fasilitas|komplain parkiran|request alat|komplain membership|komplain kelas|request kelas|komplain aplikasi)$/i;const ncols=cells[0]?.length||0;for(let col=0;col<ncols;col++){const vals=cells.map(r=>r[col]?.f||r[col]?.v||"").filter(Boolean);if(vals.filter(v=>catKw.test(v.trim())).length>vals.length*0.3){ci.issue=col;break;}}}
    const out=[];
    rows.forEach((r,i)=>{
      const rawCat=(r[ci.issue]||"").trim();if(!rawCat)return;
      const com=(r[ci.comment]||"").trim(),sum=ci.summary!=null?(r[ci.summary]||"").trim():"";
      const rat=parseInt(r[ci.rating]);
      const dsRaw=(ci.date!=null?(cells[i]?.[ci.date]?.v||""):"").trim();
      const dsDisplay=(ci.date!=null?(cells[i]?.[ci.date]?.f||cells[i]?.[ci.date]?.v||r[ci.date]||""):(r[ci.date]||"")).trim();
      const ds=dsRaw||dsDisplay;
      const feedbackVal=ci.feedback!=null?(r[ci.feedback]||"").trim():"";
      const sheetStat=(ci.status!=null?(r[ci.status]||"").trim():"")||"Untouched";
      const rawStat=feedbackVal.length>0?"Solved":sheetStat;
      out.push({id:`${gidStr}_${i}`,realRow:i+hoff+1,gid:gidStr,dateStr:dsDisplay,dateParsed:parseDate(dsRaw||dsDisplay),
        branch:normalizeBranch((r[ci.branch]||"").trim()),cat:rawCat,source:(r[ci.source]||"").trim(),
        rating:isNaN(rat)?null:rat,intiPermasalahan:sum.length>2?sum:com,
        customer:(ci.customer!=null?(r[ci.customer]||"").trim():""),
        status:rawStat,originalStatus:rawStat,sub:classifySub(rawCat,com+" "+sum)});
    });
    return out;
  }

  }

        const inDrop=dropPortalRef.current&&dropPortalRef.current.contains(e.target);
        if(!inBox&&!inDrop) setOpen(false);

      document.addEventListener("mousedown",handler);
      return()=>document.removeEventListener("mousedown",handler);
    },[]);

    function buildContext(){
      // Pakai SEMUA data dari sheet untuk divisi ini - bukan dibatasi filter tanggal UI
      const sorted=[...monthRanges].sort((a,b)=>a.year-b.year||a.month-b.month);
      const labels=sorted.length
        ? (sorted[0].labelFull+" "+sorted[0].year) + (sorted.length>1?" s/d "+sorted[sorted.length-1].labelFull+" "+sorted[sorted.length-1].year:"")
        : "semua periode";
      const recent=divData; // semua data sheet, tidak dibatasi filter UI
      const ic={},bc={},sc={},catCt={};
      recent.forEach(d=>{
        ic[d.sub]=(ic[d.sub]||0)+1;
        bc[d.branch]=(bc[d.branch]||0)+1;
        sc[d.status]=(sc[d.status]||0)+1;
        catCt[d.cat]=(catCt[d.cat]||0)+1;
      });
      const ti=Object.entries(ic).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([k,v])=>`${k}(${v})`).join(", ");
      const tb=Object.entries(bc).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([k,v])=>`${k}(${v})`).join(", ");
      const ts=Object.entries(sc).map(([k,v])=>`${k}:${v}`).join(", ");
      const tc=Object.entries(catCt).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`${k}(${v})`).join(", ");
      return{ctx:`Divisi: ${division.label}
Periode data: ${labels}

Top cabang: ${tb}

    const SUFFIX=`

Konteks: Konsultan operasional jaringan gym FTL Indonesia. Terminologi: member, cabang/outlet, FC, PT, GX, MC, OB, staff, loker, alat gym, treadmill, kebersihan, fasilitas, parkir, membership, kelas, Google Review, Quick Response, WhatsApp.

{"summary":"ringkasan 1-2 kalimat spesifik","items":[{"action":"langkah konkret maks 70 karakter","detail":"penjelasan maks 120 karakter","days":7}]}
Buat 4-6 items, days maksimal 30, actionable untuk operasional gym.`;

    async function analyze(type,customText){
      console.log("[FTL AI] analyze() called, type:", type);

      try{
        console.log("[FTL AI] building context...");
        const{ctx,labels}=buildContext();
        console.log("[FTL AI] context built, ctx length:", ctx.length);
        const titles={freq:"Isu Paling Sering Muncul",impact:"Isu Paling Berdampak",outlet:"Outlet Terbanyak Komplain",focus:"Rekomendasi Fokus Bulan Ini",custom:customText||"Analisa Custom"};
        const prompts={
          freq:`Data keluhan FTL Gym (seluruh data sheet):\n${ctx}\n\nAnalisa sub-issue paling sering muncul dari seluruh periode data, berikan action items konkret.${SUFFIX}`,
          impact:`Data keluhan FTL Gym (seluruh data sheet):\n${ctx}\n\nAnalisa sub-issue paling berdampak pada kepuasan member dan bisnis dari seluruh periode data.${SUFFIX}`,
          outlet:`Data keluhan FTL Gym (seluruh data sheet):\n${ctx}\n\nAnalisa outlet/cabang dengan keluhan terbanyak dari seluruh periode data, action untuk manajemen.${SUFFIX}`,
          focus:`Data keluhan FTL Gym (seluruh data sheet):\n${ctx}\n\nBerikan rekomendasi fokus dari 3 aspek: (1) sub-issue paling sering & berdampak, (2) outlet yang butuh intervensi segera, (3) pola status keluhan. Gabungkan jadi action terintegrasi, urutkan paling mendesak.${SUFFIX}`,
          custom:`Data keluhan FTL Gym:\n${ctx}\n\nPertanyaan: ${customText}\n\nJawab dengan action items konkret.${SUFFIX}`
        };
        console.log("[FTL AI] Sending request to Gemini...");
        console.log("[FTL AI] URL:", GEMINI_URL);
        const res=await fetch(GEMINI_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompts[type]}]}],generationConfig:{maxOutputTokens:1500,temperature:0.6}})});
        const data=await res.json();
        console.log("[FTL AI] Response status:", res.status);
        console.log("[FTL AI] Response data:", JSON.stringify(data).slice(0,500));
        if(!res.ok || data.error){
          const errMsg = data.error?.message || data.error?.status || `HTTP ${res.status}`;
          const errCode = data.error?.code || res.status;
          console.error("[FTL AI] Full error response:", JSON.stringify(data));
          // Tampilkan raw error langsung - paling informatif
          throw new Error(`[${errCode}] ${errMsg}`);
        }
        const text=data.candidates?.[0]?.content?.parts?.[0]?.text||"";
        console.log("[FTL AI] Got text response, length:", text.length);
        if(!text) throw new Error("Gemini tidak memberikan respons. Coba lagi.");
        const jm=text.match(/\{[\s\S]*\}/);

    useEffect(()=>{
      const db=firebase.database();const ref=db.ref("status");
      ref.on("value",snapshot=>{const data=snapshot.val();if(data&&typeof data==="object")setLStat(data);setFbLoaded(true);},()=>setFbLoaded(true));
      return()=>ref.off("value");
    },[]);

    const [filter,setFilter]=useState("Semua");
    const [stFilt,setStFilt]=useState("Semua Status");
    const [loading,setLoading]=useState(true);
    const [err,setErr]=useState(null);
    const [lastFetch,setLF]=useState(null);
    const [drillSub,setDrill]=useState(null);
    const [expRow,setExpRow]=useState(null);
    const [expRL,setExpRL]=useState(10);
    const [expBr,setExpBr]=useState(null);
    const [brLim,setBrLim]=useState(10);
    const [sortCfg,setSort]=useState(null);
    const [dateFrom,setFrom]=useState("");
    const [dateTo,setTo]=useState("");
    const [sheets,setSheets]=useState([]);
    const sheetsRef=useRef([]);
    const drillRef=useRef(null);
    const branchRef=useRef(null);

    const dataWithStatus=useMemo(()=>allData.map(d=>({...d,status:localStatus[d.id]??d.status})),[allData,localStatus]);

    function updateStatus(rowId,ns){
      setLStat(prev=>({...prev,[rowId]:ns}));
      setToast({id:rowId,state:"saving"});
      firebase.database().ref(`status/${String(rowId)}`).set(ns)
        .then(()=>{setToast({id:rowId,state:"saved"});setTimeout(()=>setToast(null),2000);})
        .catch(e=>{console.warn("Firebase write failed:",e);setToast({id:rowId,state:"error"});setTimeout(()=>setToast(null),3000);});
    }

    useEffect(()=>{
      if(division.key==="ALL"){setDivData(dataWithStatus);return;}
      const div=DIVISIONS.find(d=>d.key===division.key);
      if(!div||!div.match){setDivData(dataWithStatus);return;}
      const sheetList=sheetsRef.current.length?sheetsRef.current:sheets;
      if(!sheetList.length){setDivData(dataWithStatus);return;}
      const matchingGids=sheetList.filter(s=>div.match.test(s.name)).map(s=>s.id);
      if(!matchingGids.length){setDivData(dataWithStatus);return;}
      setDivData(dataWithStatus.filter(d=>matchingGids.includes(d.gid)));
    },[dataWithStatus,division,sheets,allData]);

    function localDateF(iso){if(!iso)return null;const[y,m,d]=iso.split("-").map(Number);return new Date(y,m-1,d);}
    const data=useMemo(()=>{
      if(!dateFrom&&!dateTo)return divData;
      const from=localDateF(dateFrom);const toD=localDateF(dateTo);if(toD)toD.setHours(23,59,59,999);
      return divData.filter(d=>{if(!d.dateParsed)return true;if(from&&d.dateParsed<from)return false;if(toD&&d.dateParsed>toD)return false;return true;});
    },[divData,dateFrom,dateTo]);

    const filtered=useMemo(()=>data.filter(c=>(filter==="Semua"||c.cat===filter)&&(stFilt==="Semua Status"||c.status===stFilt)),[data,filter,stFilt]);
    const dispFilt=useMemo(()=>data.filter(c=>(filter==="Semua"||c.cat===filter)&&(stFilt==="Semua Status"||c.status===stFilt||c.originalStatus===stFilt)),[data,filter,stFilt]);
    const cats=useMemo(()=>[...new Set(data.map(c=>c.cat))],[data]);
    const catCts=useMemo(()=>{const m={};data.filter(c=>stFilt==="Semua Status"||c.status===stFilt).forEach(c=>{m[c.cat]=(m[c.cat]||0)+1;});return m;},[data,stFilt]);
    const subCts=useMemo(()=>countMap(filtered,"sub"),[filtered]);
    const srcCts=useMemo(()=>countMap(filtered,"source"),[filtered]);
    const gReviews=useMemo(()=>filtered.filter(c=>c.source==="Google Review"),[filtered]);
    const oneStars=useMemo(()=>filtered.filter(c=>c.rating===1),[filtered]);
    const branchSet=useMemo(()=>new Set(filtered.map(c=>c.branch)),[filtered]);
    const daysCt=useMemo(()=>new Set(filtered.map(c=>c.dateStr)).size||1,[filtered]);
    const maxSub=subCts[0]?.[1]||1;
    const maxSrc=srcCts[0]?.[1]||1;

    const plans0=useMemo(()=>subCts.map(([sub,ct])=>{
      const raw=recoDB[sub]||{action:"Investigasi Ekstra",detail:"Selidiki pola operasional secara lebih intensif.",tl:"short",imp:"MEDIUM"};
      let imp=raw.imp;if(ct>filtered.length*0.1||ct>=5)imp="HIGH";else if(ct===1&&filtered.length>5)imp="LOW";
      const m=filtered.find(c=>c.sub===sub);
      const ownerFromCat=getOwner(m?.cat||"",division.key);
      const owner=division.key==="ALL"?ownerFromCat:(division.label);
      return{sub,count:ct,action:raw.action,detail:raw.detail,tl:raw.tl,imp,owner:owner||"Operations",iv:{HIGH:3,MEDIUM:2,LOW:1}[imp]||1};
    }),[subCts,filtered]);

    const plans=useMemo(()=>{
      const items=[...plans0];
      if(sortCfg){items.sort((a,b)=>{let vA=a[sortCfg.k],vB=b[sortCfg.k];if(typeof vA==="string"){vA=vA.toLowerCase();vB=vB.toLowerCase();}if(vA<vB)return sortCfg.d==="asc"?-1:1;if(vA>vB)return sortCfg.d==="asc"?1:-1;return b.count-a.count;});}
      else{items.sort((a,b)=>b.iv-a.iv||b.count-a.count);}
      return items;
    },[plans0,sortCfg]);

    const ts=k=>setSort(s=>({k,d:s?.k===k&&s?.d==="desc"?"asc":"desc"}));
    const Si=({col})=>{if(!sortCfg||sortCfg.k!==col)return<span style={{opacity:.2,marginLeft:2}}>&#8597;</span>;return<span style={{marginLeft:2}}>{sortCfg.d==="asc"?"&#8593;":"&#8595;"}</span>;};

    const matrix=useMemo(()=>{
      const m={hE:[],hH:[],lE:[],lH:[]};
      plans.forEach(p=>{const hi=p.iv>=2.5||(p.iv===2&&p.count>=2),hd=p.count>=Math.max(8,filtered.length*0.15)||p.sub.includes("Capacity")||p.sub.includes("Upgrade");m[(hi?"h":"l")+(hd?"H":"E")].push(p);});
      return m;
    },[plans,filtered]);

    function barColor(i,n){const t=n<=1?0:i/(n-1);const h=Math.round(t*45);const s=Math.round(75-t*20);const l=Math.round(42+t*18);return `hsl(${h},${s}%,${l}%)`;}

    const branches=useMemo(()=>{
      const bc=countMap(dispFilt,"branch"),max=bc[0]?.[1]||1,total=bc.length||1;
      return bc.map(([branch,count],i)=>{
        const issues=dispFilt.filter(c=>c.branch===branch);
        issues.sort((a,b)=>{const iA=plans0.find(p=>p.sub===a.sub)?.iv||1,iB=plans0.find(p=>p.sub===b.sub)?.iv||1;return iB-iA;});
        const critCt=issues.filter(d=>(plans0.find(p=>p.sub===d.sub)?.imp||'LOW')==='HIGH').length;
        return{branch,count,issues,critCt,pct:(count/max)*100,barColor:barColor(i,total)};
      });
    },[dispFilt,plans0]);

    const monthRanges=useMemo(()=>{
      const map={};
      divData.forEach(d=>{if(!d.dateParsed)return;const y=d.dateParsed.getFullYear(),m=d.dateParsed.getMonth();const key=`${y}-${String(m).padStart(2,'0')}`;if(!map[key])map[key]={label:MONTHS_SHORT[m],labelFull:MONTHS_ID[m],year:y,month:m};});
      return Object.values(map).sort((a,b)=>a.year-b.year||a.month-b.month).map(({label,labelFull,year,month})=>({label,labelFull,from:toISO(new Date(year,month,1)),to:toISO(new Date(year,month+1,0)),month,year}));
    },[divData]);

    const isMonthActive=mr=>dateFrom===mr.from&&dateTo===mr.to;

    const smartLabel=useMemo(()=>{
      if(!dateFrom||!dateTo)return"";
      const d1=new Date(dateFrom),d2=new Date(dateTo);if(isNaN(d1)||isNaN(d2))return"";
      const m1=d1.getMonth(),m2=d2.getMonth(),y1=d1.getFullYear(),y2=d2.getFullYear();
      if(m1===m2&&y1===y2)return`${MONTHS_ID[m1]} ${y1}`;
      if(y1===y2)return`${MONTHS_ID[m1]} - ${MONTHS_ID[m2]} ${y1}`;
      return`${MONTHS_ID[m1]} ${y1} - ${MONTHS_ID[m2]} ${y2}`;
    },[dateFrom,dateTo]);

    const drillData=drillSub?dispFilt.filter(c=>c.sub===drillSub||c.source===drillSub):[];

    useEffect(()=>{if(drillSub&&drillRef.current){setTimeout(()=>drillRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),50);}},[drillSub]);
    useEffect(()=>{if(expBr&&branchRef.current){setTimeout(()=>branchRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),50);}},[expBr]);

    const loadData=useCallback(async(gidsList)=>{
      setLoading(true);setErr(null);
      try{
        const gids=gidsList&&gidsList.length?gidsList:["0"];
        const results=await Promise.all(gids.map(g=>fetchOneSheet(g)));
        const merged=results.flat();
        if(!merged.length)throw new Error("Tidak ada data. Pastikan spreadsheet sudah dibagikan ke 'Anyone with the link'.");
        const vd=merged.map(d=>d.dateParsed).filter(Boolean).sort((a,b)=>b-a);
        if(vd.length){const latest=vd[0];setFrom(toISO(new Date(latest.getFullYear(),latest.getMonth(),1)));setTo(toISO(new Date(latest.getFullYear(),latest.getMonth()+1,0)));}
        setAllData(merged);setLF(new Date());setLoading(false);
      }catch(e){setErr(e.message);setLoading(false);}
    },[]);

    useEffect(()=>{
      if(WEB_APP_URL.includes("MASUKKAN")){loadData(["0"]);return;}
      fetch(WEB_APP_URL).then(r=>r.json()).then(d=>{
        if(!Array.isArray(d)||!d.length){loadData(["0"]);return;}
        const sh=d.filter(s=>{const p=parseSheetName(s.name);if(!p.valid)return false;if(p.year>2025)return true;if(p.year===2025&&p.monthIdx>=11)return true;return false;});
        const toLoad=sh.length?sh:d;
        const sheetObjs=toLoad.map(s=>({name:s.name,id:String(s.id)}));
        sheetsRef.current=sheetObjs;setSheets(sheetObjs);loadData(sheetObjs.map(s=>s.id));
      }).catch(e=>{console.warn("[FTL] fetch failed:",e.message);loadData(["0"]);});
    },[loadData]);

    const expDetail=()=>exportXLSX(filtered.map(p=>({Date:p.dateStr,Branch:p.branch,"Nama Customer":p.customer||"",Category:p.cat,"Sub-Issue":p.sub,Status:p.status,Rating:p.rating||"",Source:p.source,"Inti Permasalahan":p.intiPermasalahan})),`FTL_Detail_${new Date().toISOString().split('T')[0]}.xlsx`,"Detail Logs");
    const expAction=()=>{
      const wb=XLSX.utils.book_new();
      const s1=XLSX.utils.json_to_sheet(plans.map((p,i)=>({"#":i+1,"Sub-Issue":p.sub,Volume:p.count,Impact:p.imp,"Strategic Action":p.action,Detail:p.detail,Owner:p.owner,Timeline:tlMap[p.tl]?.label||""})));
      s1['!cols']=Object.keys(plans[0]||{}).map(()=>({wch:22}));XLSX.utils.book_append_sheet(wb,s1,"Action Plan Summary");
      const detail=plans.flatMap(p=>dispFilt.filter(f=>f.sub===p.sub).map(d=>({"Sub-Issue":p.sub,Impact:p.imp,"Strategic Action":p.action,Owner:p.owner,Timeline:tlMap[p.tl]?.label||"",Date:d.dateStr,Branch:d.branch,"Nama Customer":d.customer||"",Source:d.source,Status:d.status,Rating:d.rating||"","Inti Permasalahan":d.intiPermasalahan})));
      if(detail.length){const s2=XLSX.utils.json_to_sheet(detail);s2['!cols']=Object.keys(detail[0]).map(()=>({wch:22}));XLSX.utils.book_append_sheet(wb,s2,"Detail Complaints");}
      XLSX.writeFile(wb,`FTL_ActionPlan_${new Date().toISOString().split('T')[0]}.xlsx`);
    };
    const expDrill=sub=>{const rows=dispFilt.filter(f=>f.sub===sub).map(d=>({"Sub-Issue":sub,Date:d.dateStr,Branch:d.branch,Source:d.source,Status:d.status,Rating:d.rating||"",Category:d.cat,"Inti Permasalahan":d.intiPermasalahan}));exportXLSX(rows,`FTL_${sub.replace(/[^a-zA-Z0-9]/g,'_')}_${new Date().toISOString().split('T')[0]}.xlsx`,sub.slice(0,31));};
    const expBrAll=()=>{
      const wb=XLSX.utils.book_new();
      const summary=branches.map((b,i)=>({"Rank":i+1,Branch:b.branch,"Total Issues":b.count,"Critical (HIGH)":b.critCt}));
      const s1=XLSX.utils.json_to_sheet(summary);s1['!cols']=Object.keys(summary[0]).map(()=>({wch:22}));XLSX.utils.book_append_sheet(wb,s1,"Branch Summary");
      const detail=branches.flatMap(b=>b.issues.map(d=>{const p=plans0.find(pl=>pl.sub===d.sub)||{imp:"LOW",action:"--",owner:"--",tl:"short"};return{Branch:b.branch,Date:d.dateStr,"Nama Customer":d.customer||"","Sub-Issue":d.sub,Impact:p.imp,"Strategic Action":p.action,Owner:p.owner,Timeline:tlMap[p.tl]?.label||"",Source:d.source,Status:d.status,Rating:d.rating||"","Inti Permasalahan":d.intiPermasalahan};}));
      if(detail.length){const s2=XLSX.utils.json_to_sheet(detail);s2['!cols']=Object.keys(detail[0]).map(()=>({wch:22}));XLSX.utils.book_append_sheet(wb,s2,"Detail Complaints");}
      XLSX.writeFile(wb,`FTL_AllReport_${new Date().toISOString().split('T')[0]}.xlsx`);
    };

    const SVG_DL=<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
    const G=({children,style={}})=><div className="glass" style={style}>{children}</div>;

    if(loading)return(<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}><div style={{width:44,height:44,border:"3px solid rgba(0,0,0,0.10)",borderTopColor:"rgba(0,0,0,0.55)",borderRadius:"50%"}} className="spin"/><p style={{fontSize:14,fontWeight:600,color:"rgba(0,0,0,0.45)"}}>Memuat data...</p></div>);
    if(err)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}><div className="glass" style={{padding:36,maxWidth:380,textAlign:"center"}}><div style={{marginBottom:16,display:"flex",justifyContent:"center"}}><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="rgba(185,50,42,0.6)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><h3 style={{fontWeight:700,fontSize:18,color:"rgba(0,0,0,0.82)",marginBottom:8}}>Gagal Memuat</h3><p style={{fontSize:13,color:"rgba(0,0,0,0.45)",marginBottom:24,lineHeight:1.65}}>{err}</p><button onClick={()=>loadData(sheets.map(s=>s.id))} className="pill-btn active-black" style={{margin:"0 auto",gap:6}}><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>Coba Lagi</button></div></div>);

    return(
      <div style={{maxWidth:1300,margin:"0 auto",padding:"28px 20px 80px"}}>

        {/* HEADER */}
        <div className="fu" style={{marginBottom:22}}>
          <div style={{display:"grid",gridTemplateColumns:"auto 1fr",alignItems:"center",gap:16}}>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:"rgba(0,0,0,0.45)",letterSpacing:"0.10em",textTransform:"uppercase",marginBottom:7,display:"flex",alignItems:"center",gap:8}}>
                FTL GYM
                <span style={{background:"rgba(0,0,0,0.06)",borderRadius:20,padding:"2px 10px",fontSize:10,fontWeight:700,color:"rgba(0,0,0,0.50)",textTransform:"none",letterSpacing:"0.02em"}}>{division.label}</span>
              </div>
              <h1 style={{fontSize:44,fontWeight:700,color:"rgba(0,0,0,0.86)",letterSpacing:"-0.025em",lineHeight:1.05,marginBottom:6}}>Complaint Analysis</h1>
              <p style={{fontSize:13,color:"rgba(0,0,0,0.42)",fontWeight:500}}>{smartLabel} | {data.length} laporan di {branchSet.size} cabang</p>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10,alignItems:"flex-end"}}>
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
                {/* FIX 1: MonthDropdown component - Apple-style, no native select overlay */}
                {monthRanges.length>0&&(
                  <MonthDropdown monthRanges={monthRanges} smartLabel={smartLabel} isMonthActive={isMonthActive} setFrom={setFrom} setTo={setTo}/>
                )}
                <input type="date" value={dateFrom} onChange={e=>setFrom(e.target.value)}/>
                <span style={{fontSize:12,color:"rgba(0,0,0,0.25)",fontWeight:700}}>-</span>
                <input type="date" value={dateTo} onChange={e=>setTo(e.target.value)}/>
                <div className="pill-btn" style={{gap:6}}>
                  <span style={{width:7,height:7,borderRadius:"50%",background:"#2D8C5A",display:"inline-block",boxShadow:"0 0 6px rgba(45,140,90,0.50)"}}/>
                  <span style={{fontSize:11,fontWeight:600}}>Live</span>
                </div>
                <div className="pill-btn"><span style={{fontSize:11,fontWeight:600}}>{lastFetch?.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</span></div>
                <button onClick={()=>loadData(sheets.map(s=>s.id))} className="pill-btn" style={{color:"#2E6DB4",fontWeight:700,gap:5}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>Refresh
                </button>
                <button onClick={onLogout} className="pill-btn" style={{color:"rgba(0,0,0,0.45)",gap:5}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Keluar
                </button>
              </div>
            </div>
          </div>
        </div>

        {/* STATUS FILTER + ANALYSIS BOX */}
        <div className="fu" style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:16,paddingBottom:18,borderBottom:"1px solid rgba(0,0,0,0.06)"}}>
          <span style={{fontSize:10,fontWeight:800,color:"rgba(0,0,0,0.28)",letterSpacing:"0.12em",textTransform:"uppercase",marginRight:4}}>TRACK :</span>
          {[{v:"Semua Status",a:"active-black"},{v:"Untouched",a:"active-black"},{v:"On going",a:"active-orange"},{v:"Solved",a:"active-green"},{v:"Not Problem to solve",a:"active-red"}].map(({v,a})=>(
            <button key={v} onClick={()=>{setStFilt(v);setDrill(null);}} className={`pill-btn ${stFilt===v?a:""}`}>{v}</button>
          ))}
          <div style={{marginLeft:"auto",flexShrink:0}}>
            <AIAnalysis divData={divData} division={division} plans={plans} branches={branches} monthRanges={monthRanges}/>
          </div>
        </div>

        {/* CATEGORY TABS */}
        <div className="fu" style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:24}}>
          <button onClick={()=>{setFilter("Semua");setDrill(null);}} className={`tab-btn ${filter==="Semua"?"active":""}`}>
            All <span style={{opacity:.4,marginLeft:3,fontSize:10}}>{data.filter(c=>stFilt==="Semua Status"||c.status===stFilt).length}</span>
          </button>
          {cats.map(c=>(
            <button key={c} onClick={()=>{setFilter(c);setDrill(null);}} className={`tab-btn ${filter===c?"active":""}`} style={{whiteSpace:"nowrap"}}>
              {c} <span style={{opacity:.4,marginLeft:3,fontSize:10}}>{catCts[c]||0}</span>
            </button>
          ))}
        </div>

        {/* KPI CARDS */}
        <div className="fu" style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:24}}>
          {[
            {l:"COMPLAINTS",v:filtered.length,n:filter==="Semua"?division.label:filter,dot:"#2E6DB4"},
            {l:"GOOGLE REVIEWS",v:gReviews.length,n:`${oneStars.length} dapat bintang 1`,dot:"#B8332A"},
            {l:"BRANCHES",v:branchSet.size,n:"lokasi terdampak",dot:"#2D8C5A"},
            {l:"TOP ISSUE",v:subCts[0]?.[0]||"--",n:`${subCts[0]?.[1]||0} laporan`,dot:"#A86428",sm:true},
            {l:"DAILY RATE",v:(filtered.length/daysCt).toFixed(1),n:`per hari (${daysCt} hari)`,dot:"#7A52A8"},
          ].map((k,i)=>(
            <div key={i} className="kpi-card">
              <div style={{fontSize:10,fontWeight:700,color:"rgba(0,0,0,0.36)",letterSpacing:"0.10em",textTransform:"uppercase",marginBottom:12}}>{k.l}</div>
              <div style={{fontSize:k.sm?22:36,fontWeight:800,color:"rgba(0,0,0,0.84)",letterSpacing:"-0.02em",lineHeight:1,marginBottom:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{k.v}</div>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <span style={{width:6,height:6,borderRadius:"50%",background:k.dot,boxShadow:`0 0 7px ${k.dot}80`,flexShrink:0,display:"inline-block"}}/>
                <span style={{fontSize:11,color:"rgba(0,0,0,0.40)",fontWeight:500}}>{k.n}</span>
              </div>
            </div>
          ))}
        </div>

        {/* CHARTS */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
          <G style={{padding:"22px 26px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <span style={{fontSize:17,fontWeight:800,color:"rgba(0,0,0,0.82)"}}>Sub-Issues</span>
              <span style={{fontSize:10,fontWeight:600,color:"rgba(0,0,0,0.36)",background:"rgba(0,0,0,0.05)",padding:"4px 10px",borderRadius:20}}>klik untuk drill down</span>
            </div>

            {statusToast.state==="saving"&&(<><div style={{width:14,height:14,border:"2px solid rgba(255,255,255,0.35)",borderTopColor:"#fff",borderRadius:"50%"}} className="spin"/><span style={{fontSize:13,fontWeight:600,color:"#fff"}}>Menyimpan...</span></>)}
            {statusToast.state==="saved"&&(<><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span style={{fontSize:13,fontWeight:600,color:"#fff"}}>Status tersimpan</span></>)}
            {statusToast.state==="error"&&(<><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg><span style={{fontSize:13,fontWeight:600,color:"#fff"}}>Gagal menyimpan</span></>)}
          </div>
        )}

        {/* EXPORT FOOTER */}
        <G style={{padding:"18px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontSize:15,fontWeight:800,color:"rgba(0,0,0,0.80)",marginBottom:3}}>Export Data</div>
            <div style={{fontSize:12,color:"rgba(0,0,0,0.38)"}}>Download semua data dalam format Excel (.xlsx)</div>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button onClick={expDetail} className="pill-btn" style={{color:"#2E6DB4",fontWeight:700,gap:6}}>{SVG_DL} Detail Logs</button>
            <button onClick={expAction} className="pill-btn" style={{color:"#7A52A8",fontWeight:700,gap:6}}>{SVG_DL} Action Plan</button>
            <button onClick={expBrAll}  className="pill-btn" style={{color:"#2D8C5A",fontWeight:700,gap:6}}>{SVG_DL} All Report</button>
          </div>
        </G>

      </div>
    );
  }

  // ROOT
  function App(){
    const [session,setSession]=useState(()=>{
      try{const s=JSON.parse(sessionStorage.getItem("ftl_session")||"null");if(!s)return null;if(Date.now()-s.loginTime>SESSION_DURATION)return null;return s;}catch{return null;}
    });
    function handleLogin(division){const s={divKey:division.key,loginTime:Date.now()};sessionStorage.setItem("ftl_session",JSON.stringify(s));setSession(s);}
    function handleLogout(){sessionStorage.removeItem("ftl_session");setSession(null);}
    useEffect(()=>{if(!session)return;const remaining=SESSION_DURATION-(Date.now()-session.loginTime);if(remaining<=0){handleLogout();return;}const t=setTimeout(handleLogout,remaining);return()=>clearTimeout(t);},[session]);
    if(!session)return<LoginScreen onLogin={handleLogin}/>;
    const division=DIVISIONS.find(d=>d.key===session.divKey)||DIVISIONS[DIVISIONS.length-1];
    return<Dashboard division={division} onLogout={handleLogout}/>;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
